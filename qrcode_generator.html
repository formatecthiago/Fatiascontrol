<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <title>Gerador de QR Codes - Fatia's</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #f5f5f5;
            font-family: 'Arial', sans-serif;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: #E6B952;
            margin-bottom: 10px;
            font-size: 2rem;
        }
        .info {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 0.95rem;
        }
        .controles {
            text-align: center;
            margin-bottom: 30px;
        }
        .controles button {
            background: #E6B952;
            color: #000;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            margin: 0 10px;
            font-size: 1rem;
        }
        .controles button:hover { background: #d4a04a; }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }
        .qr-card {
            background: white;
            border: 2px solid #E6B952;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            page-break-inside: avoid;
        }
        .qr-card h3 {
            color: #E6B952;
            margin-bottom: 15px;
            font-size: 1.3rem;
        }
        .qrcode {
            display: flex;
            justify-content: center;
            margin: 15px 0;
        }
        .qr-url {
            font-size: 0.75rem;
            color: #666;
            word-break: break-all;
            margin: 10px 0;
            background: #f9f9f9;
            padding: 8px;
            border-radius: 4px;
            font-family: monospace;
        }
        .btn-download {
            background: #4CAF50;
            color: white;
            padding: 8px 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.85rem;
        }
        .btn-download:hover { background: #45a049; }
        .btn-print {
            background: #2196F3;
            color: white;
            padding: 8px 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.85rem;
        }
        .btn-print:hover { background: #0b7dda; }
        @media print {
            body { background: white; }
            .controles, .info { display: none; }
            .qr-card { border: 1px solid #ddd; margin-bottom: 20px; }
            .btn-download, .btn-print { display: none; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🍕 Gerador de QR Codes - Fatia's</h1>
        <div class="info">
            <p>50 QR Codes para as mesas do restaurante</p>
            <p>Cada mesa tem um acesso único com identificação automática</p>
        </div>

        <div class="controles">
            <button onclick="imprimirTodos()">🖨️ Imprimir Todos</button>
            <button onclick="baixarPDF()">📥 Baixar PDF</button>
            <button onclick="window.location.href='/operador'">↩️ Voltar</button>
        </div>

        <div class="grid" id="qrcodes-container"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script>
        const baseUrl = window.location.origin;
        
        function gerarQRCodes() {
            const container = document.getElementById('qrcodes-container');
            
            for (let mesa = 1; mesa <= 50; mesa++) {
                const card = document.createElement('div');
                card.className = 'qr-card';
                card.id = `card-mesa-${mesa}`;
                
                const url = `${baseUrl}/cliente?mesa=${mesa}`;
                
                card.innerHTML = `
                    <h3>MESA ${mesa}</h3>
                    <div class="qrcode" id="qrcode-mesa-${mesa}"></div>
                    <div class="qr-url">${url}</div>
                    <button class="btn-download" onclick="baixarQR(${mesa})">📥 Imagem</button>
                    <button class="btn-print" onclick="imprimirMesa(${mesa})">🖨️ Imprimir</button>
                `;
                
                container.appendChild(card);
                
                // Gerar QR Code
                new QRCode(document.getElementById(`qrcode-mesa-${mesa}`), {
                    text: url,
                    width: 150,
                    height: 150,
                    colorDark: "#000000",
                    colorLight: "#ffffff",
                    correctLevel: QRCode.CorrectLevel.H
                });
            }
        }

        function imprimirTodos() {
            window.print();
        }

        function imprimirMesa(mesa) {
            const card = document.getElementById(`card-mesa-${mesa}`);
            const printWindow = window.open('', '', 'height=400,width=600');
            printWindow.document.write(`
                <!DOCTYPE html>
                <html>
                <head>
                    <title>QR Code Mesa ${mesa}</title>
                    <style>
                        body { text-align: center; padding: 20px; font-family: Arial; }
                        h1 { color: #E6B952; }
                        img { margin: 20px 0; }
                    </style>
                </head>
                <body>
                    <h1>🍕 QR Code - MESA ${mesa}</h1>
                    ${card.innerHTML}
                </body>
                </html>
            `);
            printWindow.document.close();
            printWindow.print();
        }

        function baixarQR(mesa) {
            const canvas = document.querySelector(`#qrcode-mesa-${mesa} canvas`);
            if (!canvas) {
                alert('QR Code não gerado ainda. Aguarde...');
                return;
            }
            const link = document.createElement('a');
            link.href = canvas.toDataURL();
            link.download = `qrcode-mesa-${mesa}.png`;
            link.click();
        }

        function baixarPDF() {
            const element = document.getElementById('qrcodes-container');
            const opt = {
                margin: 10,
                filename: 'QRCodes-Fatias-Pizzaria.pdf',
                image: { type: 'png', quality: 0.98 },
                html2canvas: { scale: 2 },
                jsPDF: { orientation: 'portrait', unit: 'mm', format: 'a4' }
            };
            html2pdf().set(opt).save().fromElement(element);
        }

        window.addEventListener('load', gerarQRCodes);
    </script>
</body>
</html>
