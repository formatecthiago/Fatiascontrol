<!DOCTYPE html>
<html lang="pt-br">
<head>
    <script src="https://cloudflare.com"></script>
    <style>
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 20px; text-align: center; }
        .card { border: 1px solid #ccc; padding: 10px; }
    </style>
</head>
<body>
    <h2>Gerador Fatias Control</h2>
    <div id="grid" class="grid"></div>
    <script>
        const base = window.location.origin;
        for(let i=1; i<=50; i++) {
            const div = document.createElement('div');
            div.className = 'card';
            div.innerHTML = `Mesa ${i}<div id="q${i}"></div>`;
            document.getElementById('grid').appendChild(div);
            new QRCode(document.getElementById(`q${i}`), { text: `${base}/mesa/${i}`, width: 128, height: 128 });
        }
    </script>
</body>
</html>
