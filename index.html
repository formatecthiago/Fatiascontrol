// Coloque isso dentro do seu <script> no index.html
setInterval(() => {
    fetch(`/status-atendimento/${numeroMesa}`)
        .then(res => res.json())
        .then(dados => {
            if (dados.atendido) {
                // Efeito visual de retorno para o cliente
                document.body.style.backgroundColor = "#27ae60"; // Fica verde por um momento
                alert("O Gerente recebeu seu pedido! Um garçom está a caminho.");
                setTimeout(() => { document.body.style.backgroundColor = "#0a0a0a"; }, 3000);
            }
        });
}, 3000); // Verifica a cada 3 segundos
