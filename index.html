<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://tailwindcss.com"></script>
    <title>Fatia's Control - Jesus</title>
    <style>
        @import url('https://googleapis.com');
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; display: flex; justify-content: center; align-items: center; font-family: 'Montserrat', sans-serif; touch-action: manipulation; -webkit-tap-highlight-color: transparent; user-select: none; }
        .painel-container { background-image: url('/fundo.jpg'); background-size: contain; background-repeat: no-repeat; background-position: center; width: 100vw; height: 100vh; position: relative; }
        .etiqueta-mesa { position: absolute; top: 36%; left: 14%; padding: 5px 15px; border: 2px solid #E6B952; border-radius: 10px; color: #E6B952; font-weight: 900; font-size: 14px; text-transform: uppercase; background: rgba(0,0,0,0.3); z-index: 15; }
        .grade-toque { position: absolute; top: 40%; bottom: 24%; left: 12%; right: 12%; display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; gap: 20px; z-index: 10; }
        
        /* RODAPÉ AJUSTADO 1.5CM PARA CIMA */
        .grade-rodape { position: absolute; bottom: 12%; left: 15%; right: 15%; height: 8%; display: grid; grid-template-columns: 1fr 1fr; gap: 60px; z-index: 10; }
        
        .btn-acao { background: transparent; border: none; outline: none; cursor: pointer; display: block; width: 100%; height: 100%; -webkit-tap-highlight-color: transparent; }
        #notificacao-atendimento { display: none; position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #1e40af; color: white; padding: 15px 30px; border-radius: 50px; font-weight: bold; box-shadow: 0 10px 20px rgba(0,0,0,0.5); z-index: 5000; border: 2px solid #3b82f6; text-align: center; width: 85%; animation: slideIn 0.4s ease-out; }
        @keyframes slideIn { from { top: -100px; opacity: 0; } to { top: 20px; opacity: 1; } }
        #modal-wifi { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 9999; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        .balao-wifi { background: #111; border: 2px solid #E6B952; padding: 40px 20px; border-radius: 30px; text-align: center; color: white; width: 80%; }
        #overlay-inicio { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 8000; display: flex; flex-direction: column; align-items: center; justify-content: center; backdrop-filter: blur(10px); cursor: pointer; }
        .btn-iniciar-text { color: #E6B952; font-weight: 900; font-size: 28px; text-transform: uppercase; letter-spacing: 4px; animation: pulse-gold 2s infinite; }
        @keyframes pulse-gold { 0% { text-shadow: 0 0 10px rgba(230,185,82,0.2); transform: scale(1); } 50% { text-shadow: 0 0 25px rgba(230,185,82,0.7); transform: scale(1.05); } 100% { text-shadow: 0 0 10px rgba(230,185,82,0.2); transform: scale(1); } }
    </style>
</head>
<body>
    <div id="notificacao-atendimento"><span id="texto-feedback">--</span></div>
    <div id="overlay-inicio" onclick="solicitarPermissao()"><div class="text-center"><div class="btn-iniciar-text">INICIAR AGORA</div><div class="mt-4 text-[#E6B952] font-bold">MESA <span id="label-mesa-inicio">--</span></div></div></div>
    <div class="painel-container">
        <div class="etiqueta-mesa">MESA <span id="num-mesa-painel">--</span></div>
        <div class="grade-toque">
            <button onclick="confirmarEnvio('Garçom')" class="btn-acao"></button>
            <button onclick="confirmarEnvio('Conta')" class="btn-acao"></button>
            <button onclick="abrirWifi()" class="btn-acao"></button>
            <a href="https://linktr.ee" target="_blank" rel="noopener noreferrer" class="btn-acao"></a>
        </div>
        <div class="grade-rodape">
            <button onclick="sairSistema()" class="btn-acao" title="Sair"></button>
            <button onclick="minimizarSistema()" class="btn-acao" title="Minimizar"></button>
        </div>
    </div>
    <div id="modal-wifi"><div class="balao-wifi"><h2 class="text-[#E6B952] font-bold mb-4 uppercase">Wi-Fi Clientes</h2><p class="text-xs">Rede: fatias cliente</p><h1 class="text-3xl font-black text-[#E6B952] mb-8">fatias2025</h1><button onclick="fecharWifi()" class="bg-white/10 text-white px-10 py-3 rounded-full text-xs font-bold uppercase border border-white/20">Fechar</button></div></div>
    <script>
        const LOCAIS_PERMITIDOS = [{ lat: -5.890425, lon: -35.169790 }, { lat: -5.87639, lon: -35.18111 }];
        const DISTANCIA_MAXIMA = 0.08;
        const pathParts = window.location.pathname.split('/');
        const mesa = pathParts[pathParts.length - 1] || "01";
        document.getElementById('label-mesa-inicio').innerText = mesa;
        document.getElementById('num-mesa-painel').innerText = mesa;
        const somFeedback = new Audio('/suave.mp3');
        let monitoramentoStatus = null, tipoPedidoAtual = "";
        function solicitarPermissao() { iniciarSistema(); }
        function iniciarSistema() { somFeedback.play().then(() => { somFeedback.pause(); somFeedback.currentTime = 0; }).catch(() => {}); document.getElementById('overlay-inicio').style.display = 'none'; }
        function minimizarSistema() { document.getElementById('overlay-inicio').style.display = 'flex'; }
        function sairSistema() { if(confirm("Deseja encerrar o atendimento?")) window.location.href = "https://google.com"; }
        function confirmarEnvio(acao) {
            if(confirm(`Confirmar chamado de ${acao}?`)) {
                tipoPedidoAtual = acao;
                const notif = document.getElementById('notificacao-atendimento');
                notif.style.display = 'none';
                setTimeout(() => { document.getElementById('texto-feedback').innerText = "⏳ ENVIADO! AGUARDANDO..."; notif.style.backgroundColor = "#1e40af"; notif.style.display = 'block'; }, 50);
                fetch('/enviar-chamado', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ mesa, acao }) }).then(() => iniciarVigilancia());
            }
        }
        function iniciarVigilancia() {
            monitoramentoStatus = setInterval(() => {
                fetch(`/status-atendimento/${mesa}`).then(res => res.json()).then(data => {
                    if (data.atendido) {
                        somFeedback.play().catch(() => {});
                        const msg = (tipoPedidoAtual === "Garçom") ? "✅ O GARÇOM ESTÁ A CAMINHO!" : "✅ A CONTA ESTÁ VINDO!";
                        document.getElementById('texto-feedback').innerText = msg;
                        document.getElementById('notificacao-atendimento').style.backgroundColor = "#059669";
                        clearInterval(monitoramentoStatus);
                        setTimeout(() => { document.getElementById('notificacao-atendimento').style.display = 'none'; }, 6000);
                    }
                });
            }, 2500);
        }
        function abrirWifi() { document.getElementById('modal-wifi').style.display = 'flex'; }
        function fecharWifi() { document.getElementById('modal-wifi').style.display = 'none'; }
    </script>
</body>
</html>
