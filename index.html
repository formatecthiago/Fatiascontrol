<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://tailwindcss.com"></script>
    <title>Fatia's Control</title>
    <style>
        /* Ajuste para a imagem não esticar e ocupar a tela corretamente */
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background-color: #000; 
            display: flex; justify-content: center; align-items: center;
        }
        
        .painel-container {
            background-image: url('fundo.jpg'); 
            background-size: contain; /* Mantém a proporção sem esticar */
            background-repeat: no-repeat;
            background-position: center;
            width: 100vw;
            height: 100vh;
            position: relative;
        }

        /* Grade invisível para os 4 botões coloridos */
        .grade-toque {
            position: absolute;
            top: 47%; left: 14%; right: 14%; bottom: 12%;
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 15px;
            z-index: 10;
        }

        /* Botões de sistema no rodapé corrigidos para aparecerem na tela */
        .controles-sistema {
            position: absolute;
            bottom: 3%; left: 0; right: 0;
            display: flex;
            justify-content: space-around;
            padding: 0 20%;
            z-index: 20;
        }

        .btn-invisivel { background: transparent; border: none; outline: none; cursor: pointer; }
        .btn-sistema { width: 70px; height: 50px; background: transparent; border: none; cursor: pointer; }

        /* Modal do Wi-Fi */
        #modal-wifi {
            display: none; position: fixed; inset: 0; 
            background: rgba(0,0,0,0.9); z-index: 1000;
            align-items: center; justify-content: center; backdrop-filter: blur(8px);
        }
        .pop-up {
            background: #111; border: 2px solid #E6B952; padding: 30px;
            border-radius: 30px; text-align: center; color: white; width: 85%;
        }

        /* TELA DE INICIAR AGORA - Crucial para som e tela cheia */
        #overlay-inicio { 
            position: fixed; inset: 0; background: #000; z-index: 9999; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
        }
        .btn-iniciar {
            border: 2px solid #E6B952; color: #E6B952; padding: 20px 50px; 
            border-radius: 50px; font-weight: 900; font-size: 24px;
            text-transform: uppercase; letter-spacing: 2px;
            box-shadow: 0 0 20px rgba(230, 185, 82, 0.4);
        }
    </style>
</head>
<body>

    <!-- TELA INICIAL: INICIAR AGORA -->
    <div id="overlay-inicio" onclick="iniciarSistema()">
        <button class="btn-iniciar animate-bounce">
            INICIAR AGORA
        </button>
        <p class="text-[#E6B952] opacity-50 mt-4 text-[10px] uppercase">Toque para carregar o painel</p>
    </div>

    <div class="painel-container">
        <!-- Áreas de clique dos 4 botões coloridos -->
        <div class="grade-toque">
            <button onclick="confirmarEnvio('Garçom')" class="btn-invisivel"></button>
            <button onclick="confirmarEnvio('Conta')" class="btn-invisivel"></button>
            <button onclick="abrirWifi()" class="btn-invisivel"></button>
            <button onclick="confirmarEnvio('Cardápio')" class="btn-invisivel"></button>
        </div>

        <!-- Áreas de clique do Sair e Minimizar (X e Setas no rodapé) -->
        <div class="controles-sistema">
            <button onclick="sair()" class="btn-sistema"></button>
            <button onclick="minimizar()" class="btn-sistema"></button>
        </div>
    </div>

    <!-- Modal Wi-Fi -->
    <div id="modal-wifi">
        <div class="pop-up">
            <h2 style="color:#E6B952; font-weight: bold; margin-bottom: 10px;">WI-FI LIBERADO</h2>
            <p style="font-size: 10px; opacity: 0.5;">REDE: fatias cliente</p>
            <h1 style="font-size: 32px; font-weight: 900; margin: 15px 0;">fatias2025</h1>
            <button onclick="fecharWifi()" style="color: #ff4444; font-weight: bold; border: 1px solid #ff4444; padding: 5px 20px; border-radius: 20px; font-size: 10px;">FECHAR [X]</button>
        </div>
    </div>

    <script>
        const mesa = window.location.pathname.split('/').pop() || "01";
        const somAlerta = new Audio('/suave.mp3');

        function iniciarSistema() {
            // Carrega o áudio e entra em tela cheia
            somAlerta.play().then(() => { somAlerta.pause(); somAlerta.currentTime = 0; });
            document.documentElement.requestFullscreen().catch(() => {});
            document.getElementById('overlay-inicio').style.display = 'none';
        }

        function abrirWifi() { document.getElementById('modal-wifi').style.display = 'flex'; }
        function fecharWifi() { document.getElementById('modal-wifi').style.display = 'none'; }

        function sair() { if(confirm("Encerrar sistema?")) window.location.href = "about:blank"; }
        function minimizar() { document.exitFullscreen(); document.getElementById('overlay-inicio').style.display = 'flex'; }

        function confirmarEnvio(acao) {
            if(confirm(`Confirmar chamado de ${acao}?`)) {
                fetch('/enviar-chamado', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ mesa: mesa, acao: acao })
                });
            }
        }

        // Monitoramento do atendimento
        setInterval(() => {
            fetch(`/status-atendimento/${mesa}`).then(res => res.json()).then(dados => {
                if (dados.atendido) {
                    somAlerta.play().catch(()=>{});
                    alert("✅ O garçom está a caminho!");
                }
            });
        }, 5000);
    </script>
</body>
</html>
