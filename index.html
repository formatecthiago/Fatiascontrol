<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://tailwindcss.com"></script>
    <title>Fatia's Control</title>
    <style>
        @import url('https://googleapis.com');
        body { background: #0a0a0a; color: #E6B952; font-family: 'Montserrat', sans-serif; transition: 0.5s; }
        .btn-p { background: linear-gradient(145deg, #1a1a1a, #050505); border: 1px solid #E6B95244; border-radius: 20px; }
        .btn-p:active { background: #E6B952; color: #000; }
    </style>
</head>
<body class="h-screen flex flex-col p-6 justify-between text-center">
    <h1 id="num-mesa" class="text-5xl font-black italic">--</h1>
    <main class="grid grid-cols-2 gap-4">
        <button onclick="confirmarEnvio('Garçom')" class="btn-p h-32 flex items-center justify-center font-bold">GARÇOM</button>
        <button onclick="confirmarEnvio('Conta')" class="btn-p h-32 flex items-center justify-center font-bold">CONTA</button>
        <button onclick="confirmarEnvio('Cardápio')" class="btn-p h-32 flex items-center justify-center font-bold">CARDÁPIO</button>
        <button onclick="confirmarEnvio('Wi-Fi')" class="btn-p h-32 flex items-center justify-center font-bold">WI-FI</button>
    </main>
    <script>
        const mesa = window.location.pathname.split('/').pop() || "0";
        document.getElementById('num-mesa').innerText = mesa;
        const somSuave = new Audio('/suave.mp3');

        function confirmarEnvio(acao) {
            if(confirm(`Deseja solicitar ${acao}?`)) {
                enviar(acao);
            }
        }

        function enviar(acao) {
            if (navigator.vibrate) navigator.vibrate(100);
            fetch('/enviar-chamado', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ mesa: mesa, acao: acao })
            });
        }
        
        setInterval(() => {
            fetch(`/status-atendimento/${mesa}`).then(res => res.json()).then(dados => {
                if (dados.atendido) {
                    somSuave.play().catch(()=>{});
                    document.body.style.background = "#1e40af"; 
                    alert("✅ O gerente recebeu seu chamado e já está vindo!");
                    setTimeout(() => { document.body.style.background = "#0a0a0a"; }, 6000);
                }
            });
        }, 4000);
    </script>
</body>
</html>
