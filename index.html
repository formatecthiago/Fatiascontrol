<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://tailwindcss.com"></script>
    <title>Fatia's Control - Cliente</title>
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background-color: #000; 
            display: flex; justify-content: center; align-items: center;
        }
        
        .painel-container {
            background-image: url('/fundo.jpg'); 
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            width: 100vw;
            height: 100vh;
            position: relative;
        }

        /* ETIQUETA DA MESA (Vazada com borda amarela) */
        .etiqueta-mesa {
            position: absolute;
            top: 36%; /* Posicionada logo acima do quadrado vermelho */
            left: 14%;
            padding: 5px 15px;
            border: 2px solid #E6B952;
            border-radius: 10px;
            color: #E6B952;
            font-weight: 900;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            z-index: 15;
            background: rgba(0,0,0,0.2); /* Leve transparência para destacar o texto sobre a madeira */
        }

        .grade-toque {
            position: absolute;
            top: 45%; left: 14%; right: 14%; bottom: 15%;
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 15px;
            z-index: 10;
        }

        .controles-sistema {
            position: absolute;
            bottom: 4%; left: 0; right: 0;
            display: flex;
            justify-content: space-around;
            padding: 0 20%;
            z-index: 20;
        }

        .btn-invisivel { background: transparent; border: none; outline: none; cursor: pointer; }
        .btn-sistema { width: 70px; height: 50px; background: transparent; border: none; cursor: pointer; }

        #modal-wifi {
            display: none; position: fixed; inset: 0; 
            background: rgba(0,0,0,0.95); z-index: 1000;
            align-items: center; justify-content: center; backdrop-filter: blur(8px);
        }
        .pop-up {
            background: #111; border: 2px solid #E6B952; padding: 40px;
            border-radius: 30px; text-align: center; color: white; width: 85%; max-width: 400px;
        }

        #overlay-inicio { 
            position: fixed; inset: 0; background: #000; z-index: 9999; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
        }
        .btn-iniciar {
            border: 2px solid #E6B952; color: #E6B952; padding: 20px 50px; 
            border-radius: 50px; font-weight: 900; font-size: 24px;
            text-transform: uppercase; letter-spacing: 2px;
            box-shadow: 0 0 20px rgba(230, 185, 82, 0.4);
        }
    </style>
</head>
<body>

    <div id="overlay-inicio" onclick="iniciarSistema()">
        <button class="btn-iniciar animate-bounce text-center">
            INICIAR AGORA<br>
            <span class="text-[12px] font-normal opacity-70">Mesa <span id="label-mesa-inicio">--</span></span>
        </button>
    </div>

    <div class="painel-container">
        <!-- ETIQUETA DINÂMICA DA MESA -->
        <div class="etiqueta-mesa">
            MESA <span id="num-mesa-painel">--</span>
        </div>

        <div class="grade-toque">
            <button onclick="confirmarEnvio('Garçom')" class="btn-invisivel"></button>
            <button onclick="confirmarEnvio('Conta')" class="btn-invisivel"></button>
            <button onclick="abrirWifi()" class="btn-invisivel"></button>
            <button onclick="confirmarEnvio('Cardápio')" class="btn-invisivel"></button>
        </div>

        <div class="controles-sistema">
            <button onclick="sair()" class="btn-sistema"></button>
            <button onclick="minimizar()" class="btn-sistema"></button>
        </div>
    </div>

    <div id="modal-wifi">
        <div class="pop-up">
            <h2 style="color:#E6B952; font-weight: bold; margin-bottom: 10px; font-size: 18px;">WI-FI LIBERADO</h2>
            <p style="font-size: 10px; opacity: 0.5;">REDE: fatias cliente</p>
            <h1 style="font-size: 32px; font-weight: 900; margin: 15px 0; color: white;">fatias2025</h1>
            <button onclick="fecharWifi()" style="color: #ff4444; font-weight: bold; border: 1px solid #ff4444; padding: 8px 25px; border-radius: 25px; font-size: 10px; margin-top: 15px;">FECHAR [X]</button>
        </div>
    </div>

    <script>
        const pathParts = window.location.pathname.split('/');
        const mesa = pathParts[pathParts.length - 1] || "01";
        
        // Atualiza o número da mesa em todos os lugares
        document.getElementById('label-mesa-inicio').innerText = mesa;
        document.getElementById('num-mesa-painel').innerText = mesa;

        const somAlerta = new Audio('/suave.mp3');

        function iniciarSistema() {
            somAlerta.play().then(() => { somAlerta.pause(); somAlerta.currentTime = 0; });
            document.documentElement.requestFullscreen().catch(() => {});
            document.getElementById('overlay-inicio').style.display = 'none';
        }

        function abrirWifi() { document.getElementById('modal-wifi').style.display = 'flex'; }
        function fecharWifi() { document.getElementById('modal-wifi').style.display = 'none'; }

        function sair() { if(confirm("Encerrar sistema da mesa " + mesa + "?")) window.location.href = "about:blank"; }
        function minimizar() { 
            if(document.exitFullscreen) document.exitFullscreen().catch(()=>{}); 
            document.getElementById('overlay-inicio').style.display = 'flex'; 
        }

        function confirmarEnvio(acao) {
            if(confirm(`Confirmar chamado de ${acao}?`)) {
                fetch('/enviar-chamado', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ mesa: mesa, acao: acao })
                });
            }
        }

        setInterval(() => {
            fetch(`/status-atendimento/${mesa}`).then(res => res.json()).then(dados => {
                if (dados.atendido) {
                    somAlerta.play().catch(()=>{});
                    alert("✅ O garçom está a caminho!");
                }
            });
        }, 4000);
    </script>
</body>
</html>
