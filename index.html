<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://tailwindcss.com"></script>
    <title>Fatia's Control</title>
    <style>
        @import url('https://googleapis.com');
        body { background: #0a0a0a; color: #E6B952; font-family: 'Montserrat', sans-serif; transition: 0.5s; overflow: hidden; }
        .btn-p { background: linear-gradient(145deg, #1a1a1a, #050505); border: 1px solid #E6B95244; border-radius: 20px; }
        #setup-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0a0a0a; z-index: 9999; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body class="h-screen flex flex-col p-6 justify-between text-center">
    <div id="setup-overlay" onclick="ativarTelaCheia()">
        <div class="px-8 py-4 border-2 border-[#E6B952] rounded-full animate-pulse font-bold text-sm">TOQUE PARA INICIAR</div>
    </div>

    <header>
        <p class="text-[10px] text-gray-500 uppercase font-bold">MESA</p>
        <h1 id="num-mesa" class="text-5xl font-black italic">--</h1>
    </header>

    <main class="grid grid-cols-2 gap-4">
        <button onclick="confirmarEnvio('Garçom')" class="btn-p h-32 font-bold">GARÇOM</button>
        <button onclick="confirmarEnvio('Conta')" class="btn-p h-32 font-bold">CONTA</button>
        <button onclick="confirmarEnvio('Cardápio')" class="btn-p h-32 font-bold">MENU</button>
        <button onclick="confirmarEnvio('Wi-Fi')" class="btn-p h-32 font-bold">WI-FI</button>
    </main>

    <footer class="flex gap-2 mb-2">
        <button onclick="minimizar()" class="flex-1 py-3 bg-gray-900 rounded-xl text-[10px] font-bold uppercase">Minimizar</button>
        <button onclick="sair()" class="flex-1 py-3 bg-red-950/30 rounded-xl text-[10px] font-bold uppercase">Sair</button>
    </footer>

    <script>
        const mesa = window.location.pathname.split('/').pop() || "0";
        document.getElementById('num-mesa').innerText = mesa;
        const somSuave = new Audio('/suave.mp3');

        function ativarTelaCheia() {
            document.documentElement.requestFullscreen().catch(() => {});
            document.getElementById('setup-overlay').style.display = 'none';
        }

        function minimizar() {
            if (document.exitFullscreen) document.exitFullscreen().catch(() => {});
            document.getElementById('setup-overlay').style.display = 'flex';
        }

        function sair() {
            if(confirm("Tem certeza que deseja encerrar o controle da Mesa " + mesa + "?")) {
                window.location.href = "about:blank";
            }
        }

        function confirmarEnvio(acao) {
            if(confirm(`Deseja solicitar ${acao}?`)) {
                if (navigator.vibrate) navigator.vibrate(100);
                fetch('/enviar-chamado', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ mesa: mesa, acao: acao })
                });
            }
        }
        
        setInterval(() => {
            fetch(`/status-atendimento/${mesa}`).then(res => res.json()).then(dados => {
                if (dados.atendido) {
                    somSuave.play().catch(()=>{});
                    document.body.style.background = "#1e40af"; 
                    alert("✅ O gerente está vindo!");
                    setTimeout(() => { document.body.style.background = "#0a0a0a"; }, 6000);
                }
            });
        }, 4000);
    </script>
</body>
</html>
