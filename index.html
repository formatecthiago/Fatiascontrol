<script>
    const nMesa = window.location.pathname.split('/').pop() || "0";
    document.getElementById('num-mesa').innerText = nMesa;
    const somSuave = new Audio('/suave.mp3');

    function enviar(acao) {
        if (navigator.vibrate) navigator.vibrate(100);
        fetch('/enviar-chamado', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ mesa: nMesa, acao: acao })
        });
    }

    setInterval(() => {
        fetch(`/status/${nMesa}`).then(r => r.json()).then(d => {
            if (d.atendido) {
                somSuave.play().catch(()=>{});
                document.body.style.background = "#064e3b";
                setTimeout(() => { document.body.style.background = "#0a0a0a"; }, 5000);
            }
        });
    }, 4000);
</script>
