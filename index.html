<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://tailwindcss.com"></script>
    <title>Fatia's Control - Cliente</title>
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background-color: #000; 
            display: flex; justify-content: center; align-items: center;
        }
        
        .painel-container {
            background-image: url('/fundo.jpg'); 
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            width: 100vw; height: 100vh;
            position: relative;
        }

        .etiqueta-mesa {
            position: absolute; top: 36%; left: 14%; padding: 5px 15px;
            border: 2px solid #E6B952; border-radius: 10px; color: #E6B952;
            font-weight: 900; font-size: 14px; text-transform: uppercase;
            background: rgba(0,0,0,0.2); z-index: 15;
        }

        .grade-toque {
            position: absolute; top: 45%; left: 14%; right: 14%; bottom: 15%;
            display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr;
            gap: 15px; z-index: 10;
        }

        .btn-invisivel { background: transparent; border: none; outline: none; cursor: pointer; }

        /* NOTIFICAÇÃO SINCRONIZADA */
        #notificacao-atendimento {
            display: none; position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: #1e40af; color: white; padding: 20px 30px; border-radius: 50px;
            font-weight: bold; box-shadow: 0 10px 20px rgba(0,0,0,0.5); z-index: 2000;
            border: 2px solid #3b82f6; text-align: center; width: 85%;
            animation: slideDown 0.3s ease-out;
        }

        @keyframes slideDown { from { top: -100px; } to { top: 20px; } }

        #overlay-inicio { 
            position: fixed; inset: 0; background: #000; z-index: 9999; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
        }
    </style>
</head>
<body>

    <div id="notificacao-atendimento">
        <span id="texto-notificacao">✅ O GARÇOM ESTÁ A CAMINHO!</span>
    </div>

    <div id="overlay-inicio" onclick="iniciarSistema()">
        <button class="border-2 border-[#E6B952] text-[#E6B952] px-10 py-4 rounded-full animate-bounce font-bold text-xl uppercase">
            INICIAR AGORA<br>
            <span class="text-xs opacity-70">Mesa <span id="label-mesa-inicio">--</span></span>
        </button>
    </div>

    <div class="painel-container">
        <div class="etiqueta-mesa">MESA <span id="num-mesa-painel">--</span></div>
        <div class="grade-toque">
            <button onclick="confirmarEnvio('Garçom')" class="btn-invisivel"></button>
            <button onclick="confirmarEnvio('Conta')" class="btn-invisivel"></button>
            <button onclick="abrirWifi()" class="btn-invisivel"></button>
            <button onclick="confirmarEnvio('Cardápio')" class="btn-invisivel"></button>
        </div>
    </div>

    <!-- MODAL WIFI -->
    <div id="modal-wifi" class="hidden fixed inset-0 bg-black/90 z-[1000] flex items-center justify-center backdrop-blur-md">
        <div class="bg-[#111] border-2 border-[#E6B952] p-10 rounded-[30px] text-center text-white w-[85%]">
            <h2 class="text-[#E6B952] font-bold mb-4 uppercase">Wi-Fi</h2>
            <p class="text-xs opacity-50 mb-1">REDE: fatias cliente</p>
            <h1 class="text-3xl font-black mb-6">fatias2025</h1>
            <button onclick="fecharWifi()" class="border border-red-500 text-red-500 px-6 py-2 rounded-full font-bold text-[10px] uppercase">Fechar</button>
        </div>
    </div>

    <script>
        const pathParts = window.location.pathname.split('/');
        const mesa = pathParts[pathParts.length - 1] || "01";
        document.getElementById('label-mesa-inicio').innerText = mesa;
        document.getElementById('num-mesa-painel').innerText = mesa;

        let pedidoAtual = "Garçom";
        const somAlerta = new Audio('/suave.mp3');
        somAlerta.preload = "auto"; // Força o carregamento imediato

        function iniciarSistema() {
            // "Acorda" o áudio no primeiro toque para evitar o delay depois
            somAlerta.play().then(() => { 
                somAlerta.pause(); 
                somAlerta.currentTime = 0; 
            });
            document.documentElement.requestFullscreen().catch(() => {});
            document.getElementById('overlay-inicio').style.display = 'none';
        }

        function abrirWifi() { document.getElementById('modal-wifi').classList.remove('hidden'); }
        function fecharWifi() { document.getElementById('modal-wifi').classList.add('hidden'); }

        function confirmarEnvio(acao) {
            if(confirm(`Confirmar chamado de ${acao}?`)) {
                pedidoAtual = acao; // Salva o que o cliente pediu para mudar a mensagem depois
                fetch('/enviar-chamado', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ mesa: mesa, acao: acao })
                });
            }
        }

        // MONITORAMENTO ULTRA RÁPIDO
        setInterval(() => {
            fetch(`/status-atendimento/${mesa}`).then(res => res.json()).then(dados => {
                if (dados.atendido) {
                    // DISPARA O SOM PRIMEIRO QUE TUDO
                    somAlerta.currentTime = 0;
                    somAlerta.play();
                    
                    // AJUSTA A MENSAGEM
                    const texto = document.getElementById('texto-notificacao');
                    if(pedidoAtual === "Conta") {
                        texto.innerText = "✅ A CONTA ESTÁ A CAMINHO!";
                    } else if(pedidoAtual === "Cardápio") {
                        texto.innerText = "✅ O CARDÁPIO ESTÁ A CAMINHO!";
                    } else {
                        texto.innerText = "✅ O GARÇOM ESTÁ A CAMINHO!";
                    }

                    // MOSTRA O VISUAL
                    const note = document.getElementById('notificacao-atendimento');
                    note.style.display = 'block';
                    
                    setTimeout(() => { note.style.display = 'none'; }, 7000);
                }
            });
        }, 1000); 
    </script>
</body>
</html>
