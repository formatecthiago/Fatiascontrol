<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cloudflare.com">
    <title>Fatia's Control</title>
    <style>
        @import url('https://googleapis.com');
        body { background: #0a0a0a; color: #E6B952; font-family: 'Montserrat', sans-serif; transition: background 0.5s; }
        .btn-premium { background: linear-gradient(145deg, #1a1a1a, #050505); border: 1px solid rgba(230, 185, 82, 0.4); border-radius: 20px; }
        .btn-premium:active { background: #E6B952; color: #000; transform: scale(0.95); }
    </style>
</head>
<body class="h-screen flex flex-col p-6 justify-between text-center">
    <header>
        <p class="text-[10px] tracking-[0.4em] text-gray-500 uppercase">Atendimento</p>
        <h1 class="text-4xl font-black italic">MESA <span id="num-mesa">--</span></h1>
        <div class="h-1 w-full bg-[#E6B952] mt-2"></div>
    </header>

    <main class="grid grid-cols-2 gap-4">
        <button onclick="enviar('Cardápio')" class="btn-premium h-32 flex flex-col items-center justify-center gap-2">
            <i class="fas fa-utensils text-2xl"></i> <span class="text-[10px] uppercase">Cardápio</span>
        </button>
        <button onclick="enviar('Garçom')" class="btn-premium h-32 flex flex-col items-center justify-center gap-2">
            <i class="fas fa-bell-concierge text-2xl"></i> <span class="text-[10px] uppercase">Garçom</span>
        </button>
        <button onclick="enviar('Wi-Fi')" class="btn-premium h-32 flex flex-col items-center justify-center gap-2">
            <i class="fas fa-wifi text-2xl"></i> <span class="text-[10px] uppercase">Wi-Fi</span>
        </button>
        <button onclick="enviar('Conta')" class="btn-premium h-32 flex flex-col items-center justify-center gap-2">
            <i class="fas fa-receipt text-2xl"></i> <span class="text-[10px] uppercase">Conta</span>
        </button>
    </main>

    <script>
        const mesa = window.location.pathname.split('/').pop() || "0";
        document.getElementById('num-mesa').innerText = mesa;
        const somSuave = new Audio('/suave.mp3');

        function enviar(acao) {
            if (navigator.vibrate) navigator.vibrate(100); 
            fetch('/enviar-chamado', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ mesa, acao })
            }).then(() => alert("Enviado!"));
        }

        setInterval(() => {
            fetch(`/status-atendimento/${mesa}`)
                .then(res => res.json())
                .then(dados => {
                    if (dados.atendido) {
                        somSuave.play().catch(()=>{});
                        document.body.style.background = "#064e3b"; 
                        alert("✅ Atendimento Confirmado!");
                        setTimeout(() => { document.body.style.background = "#0a0a0a"; }, 8000);
                    }
                });
        }, 4000);
    </script>
</body>
</html>
