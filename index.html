<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://tailwindcss.com"></script>
    <title>Fatia's Control - Cliente</title>
    <style>
        @import url('https://googleapis.com');

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background-color: #000; 
            display: flex; justify-content: center; align-items: center;
            font-family: 'Montserrat', sans-serif;
        }
        
        .painel-container {
            background-image: url('/fundo.jpg'); 
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            width: 100vw; height: 100vh;
            position: relative;
        }

        .etiqueta-mesa {
            position: absolute; top: 36%; left: 14%; padding: 5px 15px;
            border: 2px solid #E6B952; border-radius: 10px; color: #E6B952;
            font-weight: 900; font-size: 14px; text-transform: uppercase;
            background: rgba(0,0,0,0.3); z-index: 15;
        }

        .grade-toque {
            position: absolute; top: 45%; left: 14%; right: 14%; bottom: 15%;
            display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr;
            gap: 15px; z-index: 10;
        }

        .btn-invisivel { background: transparent; border: none; outline: none; cursor: pointer; }
        .btn-sistema { width: 70px; height: 50px; background: transparent; border: none; cursor: pointer; }

        .controles-sistema {
            position: absolute; bottom: 4%; left: 0; right: 0;
            display: flex; justify-content: space-around; padding: 0 20%; z-index: 20;
        }

        /* NOTIFICAÇÃO PERSONALIZADA */
        #notificacao-atendimento {
            display: none; position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: #1e40af; color: white; padding: 20px 30px; border-radius: 50px;
            font-weight: bold; box-shadow: 0 10px 20px rgba(0,0,0,0.5); z-index: 2000;
            border: 2px solid #3b82f6; text-align: center; width: 85%;
            animation: slideIn 0.4s ease-out;
        }
        @keyframes slideIn { from { top: -100px; opacity: 0; } to { top: 20px; opacity: 1; } }

        #overlay-inicio { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 9999; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            backdrop-filter: blur(10px);
        }
        .container-iniciar {
            text-align: center; padding: 40px; border: 1px solid rgba(230, 185, 82, 0.3);
            border-radius: 40px; background: rgba(255, 255, 255, 0.03);
        }
        .btn-iniciar-text {
            color: #E6B952; font-weight: 900; font-size: 28px;
            text-transform: uppercase; letter-spacing: 4px;
            animation: pulse-gold 2s infinite;
        }
        @keyframes pulse-gold {
            0% { text-shadow: 0 0 10px rgba(230,185,82,0.2); transform: scale(1); }
            50% { text-shadow: 0 0 25px rgba(230,185,82,0.7); transform: scale(1.05); }
            100% { text-shadow: 0 0 10px rgba(230,185,82,0.2); transform: scale(1); }
        }

        #modal-wifi {
            display: none; position: fixed; inset: 0; 
            background: rgba(0,0,0,0.95); z-index: 1000;
            align-items: center; justify-content: center; backdrop-filter: blur(8px);
        }
    </style>
</head>
<body>

    <div id="notificacao-atendimento">
        <span id="texto-feedback">✅ O GARÇOM ESTÁ A CAMINHO!</span>
    </div>

    <div id="overlay-inicio" onclick="iniciarSistema()">
        <div class="container-iniciar">
            <div class="btn-iniciar-text">INICIAR AGORA</div>
            <div class="mt-4 text-[#E6B952] font-bold text-sm tracking-widest opacity-60">MESA <span id="label-mesa-inicio">--</span></div>
        </div>
    </div>

    <div class="painel-container">
        <div class="etiqueta-mesa">MESA <span id="num-mesa-painel">--</span></div>
        <div class="grade-toque">
            <button onclick="confirmarEnvio('Garçom')" class="btn-invisivel"></button>
            <button onclick="confirmarEnvio('Conta')" class="btn-invisivel"></button>
            <button onclick="abrirWifi()" class="btn-invisivel"></button>
            <button onclick="confirmarEnvio('Cardápio')" class="btn-invisivel"></button>
        </div>
        <div class="controles-sistema">
            <button onclick="sair()" class="btn-sistema"></button>
            <button onclick="minimizar()" class="btn-sistema"></button>
        </div>
    </div>

    <div id="modal-wifi">
        <div class="bg-[#111] border-2 border-[#E6B952] p-10 rounded-[30px] text-center text-white w-[85%]">
            <h2 style="color:#E6B952; font-weight: bold; margin-bottom: 10px;">WI-FI LIBERADO</h2>
            <p style="font-size: 10px; opacity: 0.5;">REDE: fatias cliente</p>
            <h1 style="font-size: 32px; font-weight: 900; margin: 15px 0;">fatias2025</h1>
            <button onclick="fecharWifi()" class="border border-red-500 text-red-500 px-6 py-2 rounded-full font-bold text-[10px] uppercase">Fechar [X]</button>
        </div>
    </div>

    <script>
        const pathParts = window.location.pathname.split('/');
        const mesa = pathParts[pathParts.length - 1] || "01";
        document.getElementById('label-mesa-inicio').innerText = mesa;
        document.getElementById('num-mesa-painel').innerText = mesa;

        const somAlerta = new Audio('/suave.mp3');
        let atendidoAnteriormente = false;
        let ultimoPedido = "Garçom"; 

        function iniciarSistema() {
            somAlerta.play().then(() => { somAlerta.pause(); somAlerta.currentTime = 0; });
            document.documentElement.requestFullscreen().catch(() => {});
            document.getElementById('overlay-inicio').style.display = 'none';
        }

        function abrirWifi() { document.getElementById('modal-wifi').style.display = 'flex'; }
        function fecharWifi() { document.getElementById('modal-wifi').style.display = 'none'; }

        function sair() { if(confirm("Encerrar mesa " + mesa + "?")) window.location.href = "about:blank"; }
        function minimizar() { 
            if(document.exitFullscreen) document.exitFullscreen().catch(()=>{}); 
            document.getElementById('overlay-inicio').style.display = 'flex'; 
        }

        function confirmarEnvio(acao) {
            if(confirm(`Confirmar chamado de ${acao}?`)) {
                ultimoPedido = acao; // Salva o tipo do pedido
                fetch('/enviar-chamado', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ mesa: mesa, acao: acao })
                });
            }
        }

        setInterval(() => {
            fetch(`/status-atendimento/${mesa}`).then(res => res.json()).then(dados => {
                if (dados.atendido && !atendidoAnteriormente) {
                    somAlerta.currentTime = 0;
                    somAlerta.play();
                    
                    const spanTexto = document.getElementById('texto-feedback');
                    const note = document.getElementById('notificacao-atendimento');
                    
                    // Personaliza a mensagem baseada no último pedido
                    if (ultimoPedido === "Conta") {
                        spanTexto.innerText = "✅ A CONTA ESTÁ A CAMINHO!";
                    } else if (ultimoPedido === "Cardápio") {
                        spanTexto.innerText = "✅ O CARDÁPIO ESTÁ A CAMINHO!";
                    } else {
                        spanTexto.innerText = "✅ O GARÇOM ESTÁ A CAMINHO!";
                    }

                    note.style.display = 'block';
                    setTimeout(() => { note.style.display = 'none'; }, 6000);
                    
                    atendidoAnteriormente = true;
                } 
                
                if (!dados.atendido) {
                    atendidoAnteriormente = false;
                }
            });
        }, 1000);
    </script>
</body>
</html>
