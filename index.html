<!DOCTYPE html> <html lang="pt-br"> <head> <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"> <script src="https://cdn.tailwindcss.com"></script> <link href="https://cdnjs.cloudflare.com" rel="stylesheet"> <title>Fatia's - Controle Total</title> <style> @import url('https://fonts.googleapis.com'); :root { --gold: #E6B952; --dark: #0a0a0a; } corpo { cor de fundo: var(--dark); cor: var(--dourado); família de fontes: 'Montserrat', sem serifa; overflow: hidden; /* Impedir rolagem */ altura: 100vh; largura: 100vw; } /* Botão Estilo Controle Remoto */ .btn-main { fundo: gradiente-linear(145deg, #1a1a1a, #050505); borda: 2px sólida var(--dourado); raio da borda: 24px; transição: todos os 0,15s de facilidade; box-shadow: 0 10px 20px rgba(0,0,0,0.6); } .btn-main:ativo { transformar: escala(0,94); fundo: var(--gold); cor: #000; } /* Botões de Sistema no Rodapé */ .btn-system { fundo: rgba(255, 255, 255, 0.05); borda: 1px sólida rgba(255, 255, 255, 0.1); filtro de fundo: desfoque(10px); raio da borda: 12px; preenchimento: 12px; cor: #666; Transição: 0,3s; } .btn-system.exit:active { background: #ef4444; color: white; border-color: #ef4444; } .btn-system.min:active { background: #3b82f6; color: white; border-color: #3b82f6; } /* Sobreposição em tela cheia para ativação */ #fullscreen-overlay { posição: fixa; topo: 0; esquerda: 0; largura: 100%; altura: 100%; fundo: rgba(0,0,0,0.9); índice z: 9999; exibir: flexível; alinhar itens: ao centro; justificar conteúdo: ao centro; alinhamento do texto: centralizado; } </style> </head> <body class="flex flex-col"> <!-- Overlay de Ativação (Necessário para forçar Full Screen no Navegador) --> <div id="fullscreen-overlay" onclick="startApp()"> <div class="p-6 border-2 border-dashed border-[#E6B952] rounded-3xl"> <i class="fas fa-expand text-5xl mb-4 animate-bounce"></i> <h2 class="text-xl font-bold">TOQUE PARA INICIAR</h2> <p class="text-sm opacity-50">Modo Controle Remoto Fatia's</p> </div> </div> <!-- Interface Principal --> <div class="flex-grow flex flex-col justify-between p-6"> <!-- Topo: Logo e Mesa --> <header class="text-center pt-4"> <div class="mb-4 flex justify-center"> <!-- Substitua pelo link real da sua imagem --> <img src="https://i.ibb.co" alt="Logotipo da Fatia" class="h-20 object-contain"> </div> <div class="inline-flex flex-col items-center"> <span class="text-[10px] tracking-[0.4em] uppercase text-gray-500 mb-1">Identificação</span> <div class="bg-[#E6B952] text-black font-black px-8 py-1 rounded-full text-xl shadow-lg"> MESA 14 </div> </div> </header> <!-- Teclado Grid 4 Teclas --> <main class="grid grid-cols-2 gap-4 max-w-sm mx-auto w-full"> <button class="btn-main h-36 flex flex-col items-center justify-center"> <i class="fas fa-pizza-slice text-3xl mb-2"></i> <span class="font-bold text-xs uppercase">Cardápio</span> </button> <button class="btn-main h-36 flex flex-col items-center justify-center"> <i class="fas fa-hand-paper text-3xl mb-2"></i> <span class="font-bold text-xs uppercase text-center">Chamar<br>Garçom</span> </button> <button class="btn-main h-36 flex flex-col items-center justify-center"> <i class="fas fa-wifi text-3xl mb-2"></i> <span class="font-bold text-xs uppercase">Wi-Fi</span> </button> <button class="btn-main h-36 flex flex-col items-center justify-center"> <i class="fas fa-file-invoice-dollar text-3xl mb-2"></i> <span class="font-bold text-xs uppercase">A Conta</span> </button> </main> <!-- Rodapé: Sistema --> <footer class="grid grid-cols-2 gap-4 max-w-sm mx-auto w-full pb-4"> <button class="btn-system min flex items-center justify-center gap-2 text-xs uppercase font-bold" onclick="toggleMinimizar()"> <i class="fas fa-compress-alt"></i> Minimizar </button> <button class="btn-system exit flex items-center justify-center gap-2 text-xs uppercase font-bold" onclick="fecharApp()"> <i class="fas fa-power-off"></i> Sair </button> </footer> </div> <script> // Função para ativar Full Screen função iniciarApp() { const elemento = document.documentElement; se (elem.requestFullscreen) { elem.requestFullscreen(); } else if (elem.webkitRequestFullscreen) { /* Safari */ elem.webkitRequestFullscreen(); } else if (elem.msRequestFullscreen) { /* IE11 */ elem.msRequestFullscreen(); } document.getElementById('fullscreen-overlay').style.display = 'none'; } // Funções de Sistema (Lógica para seu Backend) função fecharApp() { if (confirm("Deseja encerrar o atendimento?")) { janela.fechar(); // Fallback se window.close() para bloqueado: window.location.href = "about:blank"; } } função alternarMinimizar() { se (document.fullscreenElement) { document.exitFullscreen(); document.getElementById('fullscreen-overlay').style.display = 'flex'; } } </script> </body> </html>
