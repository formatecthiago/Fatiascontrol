<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <script src="https://tailwindcss.com"></script>
    <title>Mapa Fatias - Controle</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); gap: 8px; }
        /* Mesa Livre em Verde */
        .m { background: #064e3b; border: 1px solid #065f46; height: 115px; border-radius: 8px; transition: 0.3s; }
        /* Mesa Chamando em Vermelho Piscando */
        .ativa { background: #b91c1c !important; border-color: #f87171; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }
    </style>
</head>
<body class="p-4">
    <h1 class="text-xl font-bold mb-4 uppercase">MAPA <span style="color:#E6B952">FATIAS CONTROL</span></h1>
    <div id="grid" class="grid"></div>
    <audio id="som" src="/alerta.mp3"></audio>
    <script>
        let ultimoTotal = 0;
        const som = document.getElementById('som');
        function atualizar() {
            fetch('/obter-estado-geral').then(res => res.json()).then(mesas => {
                const grid = document.getElementById('grid');
                grid.innerHTML = '';
                let totalAgora = 0;
                for(let i=1; i<=50; i++) {
                    const m = mesas[i];
                    totalAgora += m.quantidade;
                    const div = document.createElement('div');
                    div.className = `m p-2 flex flex-col items-center justify-between ${m.ativa ? 'ativa' : ''}`;
                    div.innerHTML = `
                        <span class="text-[10px] font-bold">MESA ${i}</span>
                        ${m.ativa ? `
                        <span class="text-[8px] uppercase text-center font-bold">${m.acao}<br>(${m.quantidade}x)</span>
                        <div class="flex flex-col gap-1 w-full">
                            <button onclick="atender(${i})" class="bg-blue-600 text-[8px] p-1 rounded font-bold uppercase">Responder OK</button>
                            <button onclick="limpar(${i})" class="bg-black text-[8px] p-1 rounded border border-gray-600 uppercase">Limpar Mesa</button>
                        </div>` : '<span class="text-[8px] opacity-40">LIVRE</span>'} `;
                    grid.appendChild(div);
                }
                if(totalAgora > ultimoTotal) { som.play().catch(()=>{}); ultimoTotal = totalAgora; }
            });
        }
        function atender(n) { fetch('/atender/'+n, {method:'POST'}).then(atualizar); }
        function limpar(n) { fetch('/limpar/'+n, {method:'POST'}).then(atualizar); }
        setInterval(atualizar, 3000);
        atualizar();
    </script>
</body>
</html>
