<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <script src="https://tailwindcss.com"></script>
    <title>Painel Mapa - Fatias</title>
    <style>
        @import url('https://googleapis.com');
        body { background: #0a0a0a; color: white; font-family: 'Montserrat', sans-serif; }
        .grid-mesas { display: grid; grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); gap: 8px; }
        .mesa-card { background: #151515; border: 1px solid #222; min-height: 110px; transition: 0.3s; }
        .ativa { background: #b91c1c !important; border-color: #f87171; animation: pulse 1s infinite alternate; }
        @keyframes pulse { from { opacity: 1; } to { opacity: 0.7; } }
        .btn-m { font-size: 9px; font-weight: bold; padding: 4px; border-radius: 4px; text-transform: uppercase; }
    </style>
</head>
<body class="p-4">
    <h1 class="text-xl font-black italic mb-6">MAPA <span class="text-[#E6B952]">CONTROLADOR</span></h1>
    <div id="grid" class="grid-mesas"></div>
    <audio id="som" src="/alerta.mp3" preload="auto"></audio>

    <script>
        let ultimoTotal = 0;
        const somAlerta = document.getElementById('som');

        function atualizar() {
            fetch('/obter-estado-geral')
            .then(res => res.json())
            .then(mesas => {
                const grid = document.getElementById('grid');
                grid.innerHTML = '';
                let totalAgora = 0;

                for(let i=1; i<=50; i++) {
                    const m = mesas[i];
                    totalAgora += m.quantidade;
                    
                    const div = document.createElement('div');
                    div.className = `mesa-card p-2 rounded-xl flex flex-col items-center justify-between ${m.ativa ? 'ativa' : ''}`;
                    
                    div.innerHTML = `
                        <span class="text-[10px] text-gray-600">MESA</span>
                        <b class="text-2xl">${i}</b>
                        ${m.ativa ? `
                            <div class="text-[8px] bg-black/50 p-1 rounded w-full text-center leading-tight">
                                ${m.acao} (${m.quantidade}x)
                            </div>
                            <div class="flex gap-1 w-full">
                                <button onclick="atender(${i})" class="btn-m bg-green-600 flex-1">OK</button>
                                <button onclick="limpar(${i})" class="btn-m bg-black flex-1 border border-gray-700">X</button>
                            </div>
                        ` : '<span class="text-[8px] text-gray-800">LIVRE</span>'}
                    `;
                    grid.appendChild(div);
                }

                if(totalAgora > ultimoTotal) {
                    somAlerta.play().catch(()=>{});
                    ultimoTotal = totalAgora;
                }
            });
        }

        function atender(n) { fetch('/atender/'+n, {method:'POST'}).then(atualizar); }
        function limpar(n) { fetch('/limpar/'+n, {method:'POST'}).then(atualizar); }

        setInterval(atualizar, 3000);
        atualizar();
    </script>
</body>
</html>
