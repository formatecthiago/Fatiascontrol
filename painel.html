<script>
    let cliquesAntigos = 0;
    const somForte = new Audio('/alerta.mp3');

    function atualizar() {
        fetch('/obter-estado').then(r => r.json()).then(dados => {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            let cliquesAgora = 0;

            for(let i=1; i<=50; i++) {
                const m = dados[i];
                cliquesAgora += m.qtd;
                const card = document.createElement('div');
                card.className = `mesa-card ${m.ativa ? 'ativa' : ''}`;
                // ... (restante do visual dos quadrados igual antes) ...
                grid.appendChild(card);
            }

            if(cliquesAgora > cliquesAntigos) {
                somForte.play().catch(()=>{});
                cliquesAntigos = cliquesAgora;
            }
        });
    }
    // ... (funções atender e limpar usando as rotas /atender/ e /limpar/) ...
</script>
