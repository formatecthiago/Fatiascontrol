<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <script src="https://tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cloudflare.com">
    <title>Painel Controlador - Fatias</title>
    <style>
        body { background: #0a0a0a; color: white; font-family: sans-serif; }
        .gold { color: #E6B952; }
        .card-chamado { background: #1a1a1a; border-left: 4px solid #E6B952; animation: flash 1s infinite alternate; }
        @keyframes flash { from { box-shadow: 0 0 5px #E6B952; } to { box-shadow: 0 0 15px #d32f2f; } }
    </style>
</head>
<body class="p-6">
    <h1 class="text-2xl font-bold mb-6 italic">PAINEL <span class="gold">CONTROLADOR</span></h1>
    <div id="lista" class="space-y-4"></div>
    <audio id="som" src="https://mixkit.co"></audio>

    <script>
        let totalAnterior = 0;
        function atualizar() {
            fetch('/obter-chamados').then(res => res.json()).then(dados => {
                const lista = document.getElementById('lista');
                lista.innerHTML = dados.length === 0 ? '<p class="text-gray-500">Nenhum chamado...</p>' : '';
                
                if(dados.length > totalAnterior) document.getElementById('som').play();
                totalAnterior = dados.length;

                dados.forEach(c => {
                    const div = document.createElement('div');
                    div.className = "card-chamado p-4 flex justify-between items-center rounded";
                    div.innerHTML = `<div><b class="text-xl gold">MESA ${c.mesa}</b> - ${c.acao} <br><small>${c.hora}</small></div>
                                     <button onclick="resolver(${c.id})" class="bg-[#E6B952] text-black px-4 py-2 rounded font-bold">OK</button>`;
                    lista.appendChild(div);
                });
            });
        }
        function resolver(id) { fetch('/resolver-chamado/'+id, {method:'DELETE'}).then(atualizar); }
        setInterval(atualizar, 3000);
    </script>
</body>
</html>
