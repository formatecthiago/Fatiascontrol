<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <script src="https://tailwindcss.com"></script>
    <title>Painel Mapa - Fatias</title>
    <style>
        @import url('https://googleapis.com');
        body { background: #0a0a0a; color: white; font-family: 'Montserrat', sans-serif; }
        .grid-mesas { display: grid; grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); gap: 10px; }
        .mesa-card { background: #1a1a1a; border: 1px solid #333; height: 110px; transition: 0.3s; }
        .ativa { background: #d32f2f !important; border-color: #ff4444; animation: blink 1s infinite alternate; }
        @keyframes blink { from { opacity: 1; } to { opacity: 0.6; } }
        .btn-mini { font-size: 9px; font-weight: bold; padding: 4px; border-radius: 4px; text-transform: uppercase; }
    </style>
</head>
<body class="p-4">
    <h1 class="text-xl font-black italic mb-6 uppercase">Mapa <span class="text-[#E6B952]">Fatias Control</span></h1>
    <div id="grid" class="grid-mesas"></div>
    <audio id="som" src="/alerta.mp3" preload="auto"></audio>

    <script>
        let totalCliquesAntigo = 0;
        const som = document.getElementById('som');

        function atualizar() {
            fetch('/obter-estado-geral').then(res => res.json()).then(mesas => {
                const grid = document.getElementById('grid');
                grid.innerHTML = '';
                let totalCliquesNovo = 0;

                for(let i=1; i<=50; i++) {
                    const m = mesas[i];
                    totalCliquesNovo += m.quantidade;
                    const div = document.createElement('div');
                    div.className = `mesa-card p-2 rounded-xl flex flex-col items-center justify-between ${m.ativa ? 'ativa' : ''}`;
                    
                    div.innerHTML = `
                        <span class="text-[10px] text-gray-500">MESA</span>
                        <b class="text-2xl">${i}</b>
                        ${m.ativa ? `
                            <div class="text-[8px] bg-black/40 p-1 rounded w-full text-center">${m.acao} (${m.quantidade}x)</div>
                            <div class="flex gap-1 w-full">
                                <button onclick="atender(${i})" class="btn-mini bg-green-600 flex-1">OK</button>
                                <button onclick="limpar(${i})" class="btn-mini bg-black flex-1 border border-gray-600">X</button>
                            </div>
                        ` : '<span class="text-[8px] text-gray-700">LIVRE</span>'}
                    `;
                    grid.appendChild(div);
                }

                if(totalCliquesNovo > totalCliquesAntigo) {
                    som.play().catch(()=>{});
                    totalCliquesAntigo = totalCliquesNovo;
                }
            });
        }
        function atender(n) { fetch('/atender/'+n, {method:'POST'}).then(atualizar); }
        function limpar(n) { fetch('/limpar/'+n, {method:'POST'}).then(atualizar); }
        setInterval(atualizar, 3000);
        atualizar();
    </script>
</body>
</html>
