<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <script src="https://tailwindcss.com"></script>
    <title>Painel Jesus</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; overflow-x: hidden; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); gap: 8px; }
        .m { background: #064e3b; height: 120px; border-radius: 8px; border: 1px solid #065f46; }
        .ativa { background: #b91c1c !important; border-color: #f87171; animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
        #setup-overlay { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; cursor: pointer; }
    </style>
</head>
<body class="p-4">
    <div id="setup-overlay" onclick="ativarPainel()"><div class="px-8 py-4 border-2 border-[#E6B952] rounded-full animate-pulse font-bold text-[#E6B952]">ATIVAR MONITORAMENTO E SOM</div></div>
    <header class="flex justify-between items-center mb-4">
        <h1 class="text-xl font-bold uppercase">MAPA <span style="color:#E6B952">FATIAS CONTROL</span></h1>
        <div class="flex gap-2">
            <button onclick="minimizar()" class="bg-gray-800 p-2 rounded text-[10px] font-bold">Minimizar</button>
            <button onclick="sair()" class="bg-red-900 p-2 rounded text-[10px] font-bold">Sair</button>
        </div>
    </header>
    <div id="grid" class="grid"></div>
    <audio id="som" src="/alerta.mp3" preload="auto"></audio>
    <script>
        let ultimoTotal = 0;
        const som = document.getElementById('som');
        function ativarPainel() { 
            som.play().then(() => { som.pause(); som.currentTime = 0; }).catch(() => {});
            document.documentElement.requestFullscreen().catch(() => {});
            document.getElementById('setup-overlay').style.display = 'none';
            atualizar();
        }
        function minimizar() { if (document.exitFullscreen) document.exitFullscreen().catch(() => {}); document.getElementById('setup-overlay').style.display = 'flex'; }
        function sair() { if(confirm("Encerrar painel Jesus?")) window.location.href = "about:blank"; }
        function atualizar() {
            fetch('/obter-estado-geral').then(res => res.json()).then(mesas => {
                const grid = document.getElementById('grid'); grid.innerHTML = '';
                let totalAgora = 0;
                for(let i=1; i<=50; i++) {
                    const m = mesas[i]; if(m.ativa) totalAgora += m.quantidade;
                    const div = document.createElement('div');
                    div.className = `m p-2 flex flex-col items-center justify-between ${m.ativa ? 'ativa' : ''}`;
                    div.innerHTML = `<span class="text-[10px] font-bold">MESA ${i}</span>
                        ${m.ativa ? `<span class="text-[8px] uppercase text-center font-bold">${m.acao}<br>(${m.quantidade}x)</span>
                        <div class="flex flex-col gap-1 w-full"><button onclick="atender(${i})" class="bg-blue-600 text-[8px] p-1 rounded font-bold uppercase">OK</button><button onclick="limpar(${i})" class="bg-black text-[8px] p-1 rounded border border-gray-600 uppercase">Limpar</button></div>` : '<span class="text-[8px] opacity-40">LIVRE</span>'} `;
                    grid.appendChild(div);
                }
                if(totalAgora > ultimoTotal) { som.currentTime = 0; som.play().catch(() => {}); }
                ultimoTotal = totalAgora;
            });
        }
        function atender(n) { fetch('/atender/'+n, {method:'POST'}).then(atualizar); }
        function limpar(n) { fetch('/limpar/'+n, {method:'POST'}).then(atualizar); }
        setInterval(atualizar, 3000);
    </script>
</body>
</html>
