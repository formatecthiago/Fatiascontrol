<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <script src="https://tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cloudflare.com">
    <title>Painel Controlador - Fatias</title>
    <style>
        @import url('https://googleapis.com');
        body { background: #0a0a0a; color: white; font-family: 'Montserrat', sans-serif; }
        .gold { color: #E6B952; }
        .card-alerta { 
            background: #1a1a1a; border-left: 5px solid #E6B952; 
            animation: pulse 1.5s infinite alternate;
        }
        @keyframes pulse { from { box-shadow: 0 0 5px #E6B952; } to { box-shadow: 0 0 20px #d32f2f; } }
    </style>
</head>
<body class="p-6">
    <h1 class="text-2xl font-black italic mb-8">PAINEL <span class="gold">CONTROLADOR</span></h1>
    <div id="lista" class="space-y-4"></div>
    
    <script>
        let ultimoCount = 0;
        const somForte = new Audio('https://mixkit.co');

        function atualizar() {
            fetch('/obter-chamados').then(res => res.json()).then(dados => {
                const lista = document.getElementById('lista');
                
                if(dados.length > ultimoCount) {
                    somForte.play().catch(()=>{});
                    ultimoCount = dados.length;
                }
                if(dados.length === 0) {
                    lista.innerHTML = '<p class="text-gray-600">Nenhum chamado pendente...</p>';
                    ultimoCount = 0;
                    return;
                }

                lista.innerHTML = '';
                dados.forEach(c => {
                    const div = document.createElement('div');
                    div.className = "card-alerta p-5 flex justify-between items-center rounded-xl";
                    div.innerHTML = `
                        <div><b class="text-2xl gold italic">MESA ${c.mesa}</b><br><span class="text-sm uppercase font-bold">${c.acao}</span></div>
                        <button onclick="resolver(${c.id}, '${c.mesa}')" class="bg-[#E6B952] text-black px-8 py-3 rounded-lg font-bold">OK</button>
                    `;
                    lista.appendChild(div);
                });
            });
        }

        function resolver(id, mesa) {
            fetch(`/resolver-chamado/${id}/${mesa}`, { method: 'DELETE' }).then(atualizar);
        }

        setInterval(atualizar, 3000);
    </script>
</body>
</html>
